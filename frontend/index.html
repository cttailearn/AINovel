<!DOCTYPE html>
<html lang="zh-CN">

    <meta charset="UTF-8" />

    <title>AI 小说管理系统</title>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme') || 'light';
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
